<style>
  :root{
    --ink: #0E2A47;
    --ink-deep: #081B30;
    --paper: #EDF2F7;
    --steel: #9FB3C8;
    --amber: #FFB454;
    --mint: #6EE7B7;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;

  *{ box-sizing: border-box; margin:0; padding:0; }

  body{
    background: var(--ink);
    color: var(--paper);
    font-family: var(--sans);
    line-height: 1.6;
    overflow-x: hidden;
  }

  a{ color: inherit; }

  #bg-canvas{
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    z-index: 0;
    pointer-events: none;
  }

  .wrap{
    position: relative;
    z-index: 1;
    max-width: 980px;
    margin: 0 auto;
    padding: 0 28px;
  }

  /* ---------- corner-bracket panel motif ---------- */
  .panel{
    position: relative;
    border: 1px solid rgba(159,179,200,0.35);
    background: rgba(8, 27, 48, 0.55);
    backdrop-filter: blur(2px);
    padding: 32px;
  }
  .panel::before, .panel::after,
  .panel .br-tl, .panel .br-br { content:''; position:absolute; width:14px; height:14px; }
  .panel::before{ top:-1px; left:-1px; border-top:2px solid var(--amber); border-left:2px solid var(--amber); }
  .panel::after{ top:-1px; right:-1px; border-top:2px solid var(--amber); border-right:2px solid var(--amber); }
  .panel .br-tl{ bottom:-1px; left:-1px; border-bottom:2px solid var(--amber); border-left:2px solid var(--amber); }
  .panel .br-br{ bottom:-1px; right:-1px; border-bottom:2px solid var(--amber); border-right:2px solid var(--amber); }

  .tag-label{
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--amber);
  }

  /* ---------- header / back link ---------- */
  header{ padding: 40px 0 24px; }
  .back-link{
    display:inline-flex; align-items:center; gap:8px;
    font-family: var(--mono); font-size: 13px; color: var(--steel);
    text-decoration:none; border: 1px solid rgba(159,179,200,0.35);
    padding: 8px 14px; transition: all .15s ease;
  }
  .back-link:hover{ color: var(--amber); border-color: var(--amber); }

  /* ---------- project header block ---------- */
  .project-hero{ padding: 24px 0 40px; }
  .eyebrow{ font-family: var(--mono); color: var(--amber); font-size: 13px; letter-spacing: 0.1em; margin-bottom: 14px; }
  .eyebrow::before{ content:'// '; color: var(--steel); }
  h1{
    font-family: var(--mono); font-weight:600;
    font-size: clamp(26px, 4.5vw, 42px);
    line-height: 1.2; margin-bottom: 14px;
  }
  .project-year-badge{ font-family: var(--mono); font-size: 13px; color: var(--amber); }
  .project-desc{ color: var(--steel); font-size: 16px; max-width: 62ch; margin: 18px 0 22px; }
  .tags{ display:flex; flex-wrap:wrap; gap:8px; margin-bottom: 8px; }
  .tag{ font-family: var(--mono); font-size: 11px; padding: 4px 10px; border: 1px solid rgba(110,231,183,0.4); color: var(--mint); letter-spacing: 0.03em; }

  /* ---------- image gallery ---------- */
  section{ padding: 20px 0 64px; }
  .section-head{ display:flex; align-items:baseline; gap:16px; margin-bottom: 28px; }
  .section-num{ font-family: var(--mono); color: var(--amber); font-size: 14px; }
  .section-title{ font-family: var(--mono); font-size: 20px; font-weight:600; }
  .section-rule{ flex:1; height:1px; background: rgba(159,179,200,0.25); }

  .gallery{ display: flex; flex-direction: column; gap: 22px; }
  .gallery-item{
    position: relative;
    border: 1px solid rgba(159,179,200,0.3);
    background:
      repeating-linear-gradient(45deg, rgba(159,179,200,0.07) 0 10px, transparent 10px 20px),

    overflow: hidden;

  .gallery-item img{ width: 100%; display:block; }
  .gallery-item.no-img{ aspect-ratio: 16/9; }
  .gallery-item.no-img img{ display:none; }
  .gallery-item.no-img::before{
    content: 'DODAJ LINK KA SLICI';
    position: absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    font-family: var(--mono); font-size: 12px; letter-spacing: 0.05em; color: var(--steel);

  .not-found p{ color: var(--steel); margin-bottom: 24px; }

  /* ---------- footer nav ---------- */

  .btn{
    font-family: var(--mono); font-size: 13px; letter-spacing: 0.04em;
    padding: 12px 20px; border: 1px solid var(--amber); color: var(--amber);
    text-decoration: none; transition: all .15s ease;
  }
  .btn:hover{ background: var(--amber); color: var(--ink-deep); }
  .foot-note{ font-family: var(--mono); font-size: 12px; color: rgba(159,179,200,0.5); }
</style>

<script>
(function(){
  // Ista mirna scroll-parallax pozadina kao na glavnoj strani.
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  const CELL = 48;
  let w, h, cols, rows, dpr;
  let docHeight = 1;

  let scrollT = 0;
  let scrollTEased = 0;

  function resize(){
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    w = window.innerWidth;
    h = window.innerHeight;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    cols = Math.ceil(w / CELL) + 2;
    rows = Math.ceil(h / CELL) + 2;
    docHeight = Math.max(document.documentElement.scrollHeight - h, 1);
  }
  resize();
  window.addEventListener('resize', resize);

  function onScroll(){ scrollT = window.scrollY / docHeight; }
  window.addEventListener('scroll', onScroll, { passive: true });
  onScroll();

  function draw(){
    ctx.clearRect(0, 0, w, h);
    scrollTEased += (scrollT - scrollTEased) * 0.06;

    const driftX = (scrollTEased - 0.5) * CELL * 0.6;
    const driftY = scrollTEased * CELL * 1.2;

    ctx.lineWidth = 1;
    ctx.strokeStyle = 'rgba(159,179,200,0.055)';
    ctx.beginPath();
    for(let x=-1; x<=cols; x++){
      const gx = x*CELL + (driftX % CELL);
      ctx.moveTo(gx, 0); ctx.lineTo(gx, h);
    }
    for(let y=-1; y<=rows; y++){
      const gy = y*CELL + (driftY % CELL);
      ctx.moveTo(0, gy); ctx.lineTo(w, gy);
    }
    ctx.stroke();

    requestAnimationFrame(draw);
  }

  if(reduceMotion){
    ctx.lineWidth = 1;
    ctx.strokeStyle = 'rgba(159,179,200,0.055)';
    ctx.beginPath();
    for(let x=0; x<=cols; x++){ ctx.moveTo(x*CELL, 0); ctx.lineTo(x*CELL, h); }
    for(let y=0; y<=rows; y++){ ctx.moveTo(0, y*CELL); ctx.lineTo(w, y*CELL); }
    ctx.stroke();
  } else {
    requestAnimationFrame(draw);
  }
})();
</script>
